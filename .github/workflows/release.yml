name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
      - name: Verify
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace --all-targets
          cargo run -p mneme-cli -- doctor
          cargo run -p mneme-eval -- doctor
          STORE="${RUNNER_TEMP}/mneme-cli-release-smoke.json"
          cargo run -p mneme-cli -- remember "user prefers local-first tools" --store "${STORE}"
          cargo run -p mneme-cli -- context "local-first" --store "${STORE}" --json | grep -q "local-first tools"
          cargo run -p mneme-eval -- validate --suite core
          cargo run -p mneme-eval -- run --suite core --target fake
          cargo run -p mneme-eval -- run --suite core --target mneme-v1
          cargo run -p mneme-eval -- acceptance --suite core --target fake
          cargo run -p mneme-eval -- acceptance --suite core --target mneme-v1
      - name: Create GitHub release
        env:
          # Orvek-dev currently caps GITHUB_TOKEN to read-only. Set a
          # MNEME_RELEASE_TOKEN repository secret with contents write permission
          # to activate release publication from tags.
          GH_TOKEN: ${{ secrets.MNEME_RELEASE_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "MNEME_RELEASE_TOKEN is not set; skipping release publication."
            exit 0
          fi

          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes "Bootstrap release for the public Mneme repository."
