name: Auto PR Merge

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr-merge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch != 'main' &&
      (startsWith(github.event.workflow_run.head_branch, 'codex/') ||
       startsWith(github.event.workflow_run.head_branch, 'phase/'))
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if needed and merge it
        env:
          # Orvek-dev currently caps GITHUB_TOKEN to read-only. Set an
          # AUTOMERGE_TOKEN repository secret with pull request and contents
          # write permission to activate this job.
          GH_TOKEN: ${{ secrets.AUTOMERGE_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "AUTOMERGE_TOKEN is not set; skipping automatic PR merge."
            exit 0
          fi

          pr_number="$(gh pr list \
            --repo "${REPO}" \
            --head "${BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -z "${pr_number}" ]; then
            title="[auto] ${BRANCH}"
            body_file="$(mktemp)"
            {
              echo "Automated PR for ${BRANCH}."
              echo
              echo "CI passed for the branch push that triggered this PR."
              echo "This workflow only runs for same-repository branches matching codex/** or phase/**."
            } > "${body_file}"
            gh pr create \
              --repo "${REPO}" \
              --base main \
              --head "${BRANCH}" \
              --title "${title}" \
              --body-file "${body_file}"
            pr_number="$(gh pr list \
              --repo "${REPO}" \
              --head "${BRANCH}" \
              --state open \
              --json number \
              --jq '.[0].number')"
          fi

          gh pr merge "${pr_number}" \
            --repo "${REPO}" \
            --squash \
            --delete-branch
