name: Auto PR Merge

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr-merge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Merge successful pull request
        env:
          # Orvek-dev currently caps GITHUB_TOKEN to read-only. Set an
          # AUTOMERGE_TOKEN repository secret with pull request and contents
          # write permission to activate this job.
          GH_TOKEN: ${{ secrets.AUTOMERGE_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "AUTOMERGE_TOKEN is not set; skipping automatic PR merge."
            exit 0
          fi

          pr_number="$(gh pr list \
            --repo "${REPO}" \
            --head "${BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -z "${pr_number}" ]; then
            echo "No open pull request found for ${BRANCH}; skipping."
            exit 0
          fi

          gh pr merge "${pr_number}" \
            --repo "${REPO}" \
            --squash \
            --delete-branch
