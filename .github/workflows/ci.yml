name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "phase/**"

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --all-targets
      - name: Eval harness doctor
        run: cargo run -p mneme-eval -- doctor
      - name: Eval core suite
        run: cargo run -p mneme-eval -- run --suite core
      - name: Eval seeded fault check
        run: |
          if cargo run -p mneme-eval -- run --suite core --seeded-fault skip-claims; then
            echo "seeded fault unexpectedly passed"
            exit 1
          fi
