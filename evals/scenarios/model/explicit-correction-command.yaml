id: model-explicit-correction-command
tags:
  - model
  - command-extractor
  - lifecycle
budget:
  daily_cloud_tokens: 100
events:
  - speaker_id: user
    actor_agent_id: codex
    scope: private
    trust_level: trusted_user
    text: "I work best with local-first tools; please remember that."
  - speaker_id: user
    actor_agent_id: codex
    scope: private
    trust_level: trusted_user
    text: "correct: user prefers local-first tools -> user prefers terminal workflows"
expected:
  event_append:
    count: 2
  claims:
    - subject: user
      predicate: prefers
      object: local-first tools
      status: superseded
      scope: private
    - subject: user
      predicate: prefers
      object: terminal workflows
      status: active
      scope: private
  context_pack:
    query: "terminal workflows"
    must_include:
      - terminal workflows
    must_not_include:
      - local-first tools
    citation_required: true
  budget:
    hard_cap_violations: 0
  audit:
    read_write_events_required: true
    claim_update_required: true
