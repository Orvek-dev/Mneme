id: model-implicit-communication-style
tags:
  - model
  - command-extractor
  - recall
  - category-recall
  - category-preference
  - category-communication
budget:
  daily_cloud_tokens: 100
events:
  - speaker_id: user
    actor_agent_id: codex
    scope: private
    trust_level: trusted_user
    text: "For future planning docs, keep explanations direct and skip motivational language."
expected:
  event_append:
    count: 1
  claims:
    - subject: user
      predicate: prefers
      object: direct explanations in future planning docs
      status: active
      scope: private
  context_pack:
    query: "planning docs"
    must_include:
      - direct explanations
    citation_required: true
  budget:
    hard_cap_violations: 0
  audit:
    read_write_events_required: true
