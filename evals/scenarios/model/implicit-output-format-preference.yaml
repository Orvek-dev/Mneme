id: model-implicit-output-format-preference
tags:
  - model
  - command-extractor
  - recall
  - category-recall
  - category-preference
budget:
  daily_cloud_tokens: 100
events:
  - speaker_id: user
    actor_agent_id: codex
    scope: private
    trust_level: trusted_user
    text: "When you summarize options for me, I prefer compact tables."
expected:
  event_append:
    count: 1
  claims:
    - subject: user
      predicate: prefers
      object: compact tables for option summaries
      status: active
      scope: private
  context_pack:
    query: "summaries"
    must_include:
      - compact tables
    citation_required: true
  budget:
    hard_cap_violations: 0
  audit:
    read_write_events_required: true
