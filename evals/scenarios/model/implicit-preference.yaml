id: model-implicit-preference
tags:
  - model
  - command-extractor
  - recall
budget:
  daily_cloud_tokens: 100
events:
  - speaker_id: user
    actor_agent_id: codex
    scope: private
    trust_level: trusted_user
    text: "I work best with local-first tools; please remember that."
expected:
  event_append:
    count: 1
  claims:
    - subject: user
      predicate: prefers
      object: local-first tools
      status: active
      scope: private
  context_pack:
    query: "local-first"
    must_include:
      - local-first tools
    citation_required: true
  budget:
    hard_cap_violations: 0
  audit:
    read_write_events_required: true
