id: forget-persists
tags:
  - lifecycle
  - forget
  - persistence
budget:
  daily_cloud_tokens: 100
persistence:
  restart_after_event: 2
events:
  - speaker_id: user
    actor_agent_id: codex
    scope: private
    trust_level: trusted_user
    text: "remember: user prefers local-first tools"
  - speaker_id: user
    actor_agent_id: codex
    scope: private
    trust_level: trusted_user
    text: "forget: user prefers local-first tools"
expected:
  event_append:
    count: 2
  claims:
    - subject: user
      predicate: prefers
      object: local-first tools
      status: forgotten
      scope: private
  context_pack:
    query: "local-first"
    must_not_include:
      - local-first tools
    citation_required: true
  budget:
    hard_cap_violations: 0
  audit:
    read_write_events_required: true
    claim_update_required: true
