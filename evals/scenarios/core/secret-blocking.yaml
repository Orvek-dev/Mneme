id: secret-blocking
tags:
  - firewall
  - secret
budget:
  daily_cloud_tokens: 100
events:
  - speaker_id: user
    actor_agent_id: codex
    scope: private
    trust_level: trusted_user
    text: "remember: user note API_KEY=FAKE_TEST_VALUE"
expected:
  event_append:
    count: 1
  claims:
    - subject: user
      predicate: note
      object: API_KEY=FAKE_TEST_VALUE
      status: blocked_secret
      scope: private
  context_pack:
    query: "API key"
    must_not_include:
      - FAKE_TEST_VALUE
    citation_required: true
  budget:
    hard_cap_violations: 0
  audit:
    read_write_events_required: true
