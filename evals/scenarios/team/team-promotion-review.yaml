id: team-promotion-review
tags:
  - team
  - promotion
  - audit
budget:
  daily_cloud_tokens: 100
team_flow:
  workspace_id: engineering
  users:
    - id: alice
      role: admin
    - id: bob
      role: member
  agents:
    - id: codex-bob
      owner_user_id: bob
  projects:
    - id: atlas
      members:
        - bob
  memories:
    - actor:
        user_id: bob
        agent_id: codex-bob
      scope: project:atlas
      text: "remember: Atlas deploys require rollback notes"
  promotions:
    - actor:
        user_id: bob
        agent_id: codex-bob
      source_memory_id: team-memory-001
      note: "Shared deployment rule"
  reviews:
    - actor:
        user_id: alice
      promotion_id: team-promotion-001
      approve: true
  contexts:
    - actor:
        user_id: alice
      query: "rollback notes"
expected:
  team:
    validation_ok: true
    memory_count: 2
    active_memory_count: 2
    blocked_secret_count: 0
    promotion_count: 1
    pending_promotion_count: 0
    approved_promotion_count: 1
    rejected_promotion_count: 0
    denied_count: 0
    scope_leak_count: 0
    secret_leak_count: 0
    context_item_count: 1
    context_must_include:
      - rollback notes
    omitted_reason_contains:
      - project scope denied
    citation_required: true
    audit_kinds:
      - team.promotion.create
      - team.promotion.approve
      - team.context.read
