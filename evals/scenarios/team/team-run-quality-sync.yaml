id: team-run-quality-sync
tags:
  - team
  - run
  - quality
  - sync
budget:
  daily_cloud_tokens: 100
team_flow:
  workspace_id: engineering
  users:
    - id: alice
      role: admin
    - id: bob
      role: member
  agents:
    - id: codex-bob
      owner_user_id: bob
  projects:
    - id: atlas
      members:
        - bob
  memories:
    - actor:
        user_id: bob
        agent_id: codex-bob
      scope: project:atlas
      text: "remember: Atlas deploy flag is enabled"
    - actor:
        user_id: bob
        agent_id: codex-bob
      scope: project:atlas
      text: "remember: Atlas deploy flag is enabled"
    - actor:
        user_id: bob
        agent_id: codex-bob
      scope: project:atlas
      text: "remember: Atlas deploy flag is disabled"
  runs:
    - actor:
        user_id: bob
        agent_id: codex-bob
      task: "Atlas deploy handoff"
      query: "deploy flag"
      scope: project:atlas
      notes:
        - scope: project:atlas
          text: "remember: Atlas run requires smoke test"
      end:
        summary: "Deploy flag reviewed"
        next:
          - "Check smoke test"
        remember:
          - "remember: Atlas next agent should verify smoke test"
        scope: project:atlas
      handoff: true
  contexts:
    - actor:
        user_id: bob
        agent_id: codex-bob
      query: "smoke test deploy flag"
expected:
  team:
    validation_ok: true
    memory_count: 5
    active_memory_count: 5
    run_count: 1
    open_run_count: 0
    closed_run_count: 1
    denied_count: 0
    scope_leak_count: 0
    secret_leak_count: 0
    sync_memory_count: 5
    sync_omitted_count: 0
    sync_checksum_verified: true
    handoff_context_item_count: 5
    quality_ok: false
    quality_duplicate_group_count: 1
    quality_conflict_group_count: 1
    context_item_count: 5
    context_must_include:
      - deploy flag
      - smoke test
    citation_required: true
    audit_kinds:
      - team.run.begin
      - team.run.note
      - team.run.end
      - team.run.handoff
