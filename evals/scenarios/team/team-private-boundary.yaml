id: team-private-boundary
tags:
  - team
  - acl
  - scope-leak
budget:
  daily_cloud_tokens: 100
team_flow:
  workspace_id: engineering
  users:
    - id: alice
      role: admin
    - id: bob
      role: member
  agents:
    - id: codex-bob
      owner_user_id: bob
  memories:
    - actor:
        user_id: alice
      scope: private:alice
      text: "remember: Alice keeps launch notes private"
  contexts:
    - actor:
        user_id: bob
        agent_id: codex-bob
      query: "launch notes"
expected:
  team:
    validation_ok: true
    memory_count: 1
    active_memory_count: 1
    blocked_secret_count: 0
    denied_count: 0
    scope_leak_count: 0
    secret_leak_count: 0
    context_item_count: 0
    context_must_not_include:
      - launch notes
    full_output_must_not_include:
      - Alice keeps launch notes private
    omitted_reason_contains:
      - private scope denied
    audit_kinds:
      - team.memory.write
      - team.context.read
