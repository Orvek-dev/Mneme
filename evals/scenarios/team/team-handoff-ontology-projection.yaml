id: team-handoff-ontology-projection
tags:
  - team
  - handoff
  - ontology
budget:
  daily_cloud_tokens: 100
team_flow:
  workspace_id: engineering
  users:
    - id: alice
      role: admin
    - id: bob
      role: member
  agents:
    - id: codex-bob
      owner_user_id: bob
  projects:
    - id: atlas
      members:
        - bob
  memories:
    - actor:
        user_id: bob
        agent_id: codex-bob
      scope: project:atlas
      text: "remember: Atlas handoff notes require test command and rollback owner"
  contexts:
    - actor:
        user_id: bob
        agent_id: codex-bob
      query: "handoff rollback test"
expected:
  team:
    validation_ok: true
    memory_count: 1
    active_memory_count: 1
    context_item_count: 1
    sync_memory_count: 1
    sync_omitted_count: 0
    handoff_context_item_count: 1
    firewall_ok: true
    firewall_high_count: 0
    ontology_entity_count: 6
    ontology_relation_count: 8
    ontology_attribute_count: 8
    context_must_include:
      - test command
      - rollback owner
    citation_required: true
