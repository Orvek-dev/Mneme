id: team-secret-blocking
tags:
  - team
  - secret
  - safety
budget:
  daily_cloud_tokens: 100
team_flow:
  workspace_id: engineering
  users:
    - id: alice
      role: admin
  memories:
    - actor:
        user_id: alice
      scope: team
      text: "remember: Rotation token=PUBLIC_TEST_VALUE must not appear"
  contexts:
    - actor:
        user_id: alice
      query: "rotation token"
expected:
  team:
    validation_ok: true
    memory_count: 1
    active_memory_count: 0
    blocked_secret_count: 1
    denied_count: 0
    scope_leak_count: 0
    secret_leak_count: 0
    context_item_count: 0
    context_must_not_include:
      - PUBLIC_TEST_VALUE
    omitted_reason_contains:
      - blocked_secret
    audit_kinds:
      - team.memory.blocked
      - team.context.read
