id: dogfood-agent-session-review-loop
tags:
  - dogfood
  - v1-readiness
  - agent
  - session
  - recall
  - category-agent
  - category-dogfood
events:
  - speaker_id: user
    actor_agent_id: codex
    scope: private
    trust_level: trusted_user
    text: "remember: user prefers local-first tools"
agent_flow:
  begin:
    task: "Draft a setup plan"
    actor_agent_id: codex
    query: "local-first"
  end:
    summary: "Prepared a concise setup plan"
    remember:
      - "user prefers concise setup plans"
expected:
  event_append:
    count: 2
  claims:
    - subject: user
      predicate: prefers
      object: local-first tools
      status: active
      scope: private
    - subject: user
      predicate: prefers
      object: concise setup plans
      status: active
      scope: private
  session:
    status: closed
    task: "Draft a setup plan"
    actor_agent_id: codex
    context_must_include:
      - local-first tools
    memory_event_count: 1
    summary_contains: concise setup
  context_pack:
    query: "concise"
    must_include:
      - concise setup plans
    citation_required: true
  budget:
    hard_cap_violations: 0
  audit:
    read_write_events_required: true
    session_events_required: true
