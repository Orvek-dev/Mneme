id: agent-end-secret-memory-blocked
tags:
  - agent
  - session
  - secret
  - category-agent
events:
  - speaker_id: user
    actor_agent_id: codex
    scope: private
    trust_level: trusted_user
    text: "remember: user prefers safety checks"
agent_flow:
  begin:
    task: "Review local safety"
    actor_agent_id: codex
    query: "safety"
  end:
    summary: "Reviewed safety checks without exposing secrets"
    remember:
      - "user note TOKEN=FAKE_TOKEN_VALUE"
expected:
  event_append:
    count: 2
  claims:
    - subject: user
      predicate: prefers
      object: safety checks
      status: active
      scope: private
    - subject: user
      predicate: note
      object: TOKEN=FAKE_TOKEN_VALUE
      status: blocked_secret
      scope: private
  session:
    status: closed
    task: "Review local safety"
    actor_agent_id: codex
    context_must_include:
      - safety checks
    memory_event_count: 1
    summary_contains: safety checks
  context_pack:
    query: "TOKEN"
    must_not_include:
      - TOKEN=FAKE_TOKEN_VALUE
  budget:
    hard_cap_violations: 0
  audit:
    read_write_events_required: true
    session_events_required: true
