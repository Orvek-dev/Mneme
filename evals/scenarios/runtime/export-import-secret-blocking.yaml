id: runtime-export-import-secret-blocking
tags:
  - runtime
  - persistence
  - secret
  - import-export
  - category-runtime
maintenance:
  export_import_roundtrip: true
events:
  - speaker_id: user
    actor_agent_id: codex
    scope: private
    trust_level: trusted_user
    text: "remember: user note API_KEY=FAKE_TEST_VALUE"
expected:
  event_append:
    count: 1
  claims:
    - subject: user
      predicate: note
      object: API_KEY=FAKE_TEST_VALUE
      status: blocked_secret
      scope: private
  context_pack:
    query: "API key"
    must_not_include:
      - API_KEY=FAKE_TEST_VALUE
  budget:
    hard_cap_violations: 0
  store:
    schema_version: 1
    valid: true
    backup_required: true
    imported: true
