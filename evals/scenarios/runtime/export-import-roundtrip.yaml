id: runtime-export-import-roundtrip
tags:
  - runtime
  - persistence
  - import-export
  - category-runtime
maintenance:
  export_import_roundtrip: true
events:
  - speaker_id: user
    actor_agent_id: codex
    scope: private
    trust_level: trusted_user
    text: "remember: user prefers portable memory"
expected:
  event_append:
    count: 1
  claims:
    - subject: user
      predicate: prefers
      object: portable memory
      status: active
      scope: private
  context_pack:
    query: "portable"
    must_include:
      - portable memory
    citation_required: true
  budget:
    hard_cap_violations: 0
  audit:
    read_write_events_required: true
  store:
    schema_version: 1
    valid: true
    backup_required: true
    imported: true
